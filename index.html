<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aegean Week | NutriMind</title>
    <link rel="stylesheet" href="/apps/aegean-week/diet.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/apps/aegean-week/src/dietPlannerApp.js"></script>
    <script>
      function addSeasonalRotationReferenceLink() {
        const referenceDropdown = Array.from(document.querySelectorAll('.nav-item.has-dropdown'))
          .find((item) => (item.textContent || '').toLowerCase().includes('reference'))
          ?.querySelector('.nav-dropdown');

        if (!referenceDropdown || referenceDropdown.querySelector('a[href="/seasonal-rotation"]')) return;

        const link = document.createElement('a');
        link.href = '/seasonal-rotation';
        link.className = 'nav-dropdown-item';
        link.textContent = 'Seasonal Rotation';
        referenceDropdown.appendChild(link);
      }

      addSeasonalRotationReferenceLink();
      new MutationObserver(addSeasonalRotationReferenceLink).observe(document.body, {
        childList: true,
        subtree: true
      });
    </script>
  </body>
</html>
