  <style>
.top-nav{max-width:1100px;margin:0 auto;padding:32px 20px 0;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:relative}
.nav-logo-link{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--accent);text-decoration:none;white-space:nowrap;margin-right:8px}
.nav-toggle{display:none;background:none;border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 14px;border-radius:20px;cursor:pointer}
.nav-links{display:flex;gap:8px;flex-wrap:wrap}
.nav-link{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:6px 14px;border-radius:20px;transition:all .2s;white-space:nowrap}
.nav-link:hover,.nav-link.active{border-color:var(--accent);color:var(--accent)}
@media(max-width:900px){.nav-toggle{display:block}.nav-links{display:none;flex-direction:column;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;gap:6px;position:absolute;top:44px;left:0;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.3)}.nav-links.open{display:flex}.nav-link{width:100%;text-align:left}}
</style>
</head>
