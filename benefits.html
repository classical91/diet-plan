<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Benefits | NutriMind</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/nav.css">
<style>
  :root {
    --bg: #0f0d0a;
    --surface: #1a1714;
    --card: #201d19;
    --border: #2e2a24;
    --accent: #c8922a;
    --green: #8fbe6b;
    --blue: #5b9bd5;
    --pink: #c86b8f;
    --purple: #9b7de8;
    --teal: #5bbfb5;
    --text: #f0ebe3;
    --muted: #7a7063;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 40px 20px 80px;
    background-image:
      radial-gradient(ellipse at 15% 10%, rgba(200,146,42,0.06) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 90%, rgba(91,155,213,0.05) 0%, transparent 50%);
  }
  header { text-align: center; margin-bottom: 36px; }
  .sub-label { font-size: 11px; font-weight: 500; letter-spacing: 0.35em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
  h1 { font-family: 'Playfair Display', serif; font-size: clamp(28px, 5vw, 52px); font-weight: 900; letter-spacing: -0.02em; line-height: 1; }
  h1 em { color: var(--accent); font-style: italic; }
  .header-line { width: 50px; height: 2px; background: var(--accent); margin: 16px auto 0; opacity: 0.5; }

  /* Search + Filter */
  .controls { max-width: 900px; margin: 0 auto 28px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .search-wrap { flex: 1; min-width: 200px; position: relative; }
  .search-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 14px 10px 36px; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; transition: border 0.2s; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }
  .cat-filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .cat-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; padding: 6px 12px; border-radius: 20px; cursor: pointer; transition: all 0.2s; }
  .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cat-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,146,42,0.08); }

  /* Count */
  .result-count { max-width: 900px; margin: 0 auto 16px; font-size: 12px; color: var(--muted); letter-spacing: 0.1em; }

  /* Grid */
  .grid { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    animation: fadeUp 0.3s ease both;
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s, transform 0.2s;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); }

  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

  .card-icon { font-size: 22px; flex-shrink: 0; }
  .card-title { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.2; }
  .card-cat { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; margin-top: 3px; }
  .card-arrow { margin-left: auto; color: var(--muted); flex-shrink: 0; transition: transform 0.2s, color 0.2s; }
  .card:hover .card-arrow { color: var(--accent); transform: translateX(2px); }

  .tag { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; border: 1px solid; display: inline-block; }

  .tag-herb { border-color: rgba(143,190,107,0.3); color: var(--green); background: rgba(143,190,107,0.07); }
  .tag-food { border-color: rgba(200,146,42,0.3); color: var(--accent); background: rgba(200,146,42,0.07); }
  .tag-drink { border-color: rgba(91,155,213,0.3); color: var(--blue); background: rgba(91,155,213,0.07); }
  .tag-supp { border-color: rgba(155,125,232,0.3); color: var(--purple); background: rgba(155,125,232,0.07); }
  .tag-spice { border-color: rgba(200,107,143,0.3); color: var(--pink); background: rgba(200,107,143,0.07); }
  .tag-fungi { border-color: rgba(91,191,181,0.3); color: var(--teal); background: rgba(91,191,181,0.07); }

  /* Subsections */
  .subsection { max-width: 900px; margin: 0 auto 8px; }
  .subsection-header {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 0;
    user-select: none;
  }
  .subsection-header:hover { border-color: #3e3a32; background: #1d1a16; }
  .subsection-header.open { border-color: var(--accent); border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
  .subsection-icon { font-size: 18px; }
  .subsection-title { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 700; color: var(--text); flex: 1; }
  .subsection-count { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }
  .subsection-chevron { color: var(--muted); transition: transform 0.25s; }
  .subsection-header.open .subsection-chevron { transform: rotate(180deg); }
  .subsection-color-bar { height: 3px; background: var(--teal); border-radius: 0; margin: 0; }
  .subsection-body {
    display: none;
    border: 1px solid var(--accent);
    border-top: none;
    border-bottom-left-radius: 8px;
    border-bottom-right-radius: 8px;
    padding: 12px;
    background: #13100d;
  }
  .subsection-body.open { display: block; }
  .subsection-body .grid { max-width: 100%; margin: 0; }

  .no-results { max-width: 900px; margin: 40px auto; text-align: center; color: var(--muted); font-family: 'Playfair Display', serif; font-size: 18px; }

  /* Detail view */
  .detail { max-width: 760px; margin: 0 auto; }
  .detail-back {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--muted); text-decoration: none;
    font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase;
    margin-bottom: 24px;
    transition: color 0.15s;
  }
  .detail-back:hover { color: var(--accent); }
  .detail-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px;
  }
  .detail-head { display: flex; align-items: center; gap: 18px; margin-bottom: 8px; }
  .detail-icon { font-size: 48px; line-height: 1; }
  .detail-name { font-family: 'Playfair Display', serif; font-size: clamp(24px, 4vw, 36px); font-weight: 700; }
  .detail-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .detail-summary {
    font-size: 16px; color: #d6c8ad; line-height: 1.6;
    padding: 16px 18px; border-left: 2px solid var(--accent);
    background: rgba(200,146,42,0.04); border-radius: 0 6px 6px 0;
    margin: 0 0 8px;
  }
  .detail-section-label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.25em;
    text-transform: uppercase; color: var(--accent);
    margin: 28px 0 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .detail-section-label .label-icon { font-size: 14px; opacity: 0.85; }
  .detail-benefits, .detail-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .detail-benefits li, .detail-list li { display: flex; gap: 10px; align-items: flex-start; font-size: 15px; color: #c8b89a; line-height: 1.55; }
  .detail-benefits li::before { content: '—'; color: var(--accent); flex-shrink: 0; margin-top: 2px; }
  .detail-list.mechanisms li::before { content: '⚛'; color: var(--blue); flex-shrink: 0; font-size: 13px; margin-top: 3px; }
  .detail-list.forms li::before { content: '◆'; color: var(--teal); flex-shrink: 0; font-size: 11px; margin-top: 5px; }
  .detail-list.pairings li::before { content: '+'; color: var(--green); flex-shrink: 0; font-weight: 600; margin-top: 1px; }
  .detail-list.cautions li::before { content: '!'; color: var(--pink); flex-shrink: 0; font-weight: 700; margin-top: 1px; }
  .detail-dosage {
    font-size: 15px; color: #c8b89a; line-height: 1.6;
    padding: 14px 16px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px;
  }
  .detail-dosage strong { color: var(--text); font-weight: 500; }
  .detail-disclaimer {
    margin-top: 28px; padding: 12px 14px;
    font-size: 12px; color: var(--muted); line-height: 1.5;
    border-top: 1px solid var(--border);
    font-style: italic;
  }
  .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
  .related-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    text-decoration: none;
    font-size: 13px;
    transition: border-color 0.15s, transform 0.15s;
  }
  .related-item:hover { border-color: var(--accent); transform: translateY(-1px); }
  .related-item-icon { font-size: 18px; }
</style>
</head>

let activeCat = 'all';
const grid = document.getElementById('grid');
const noResults = document.getElementById('noResults');

const SUBSECTIONS = {
  fungi: [
    { id:'mushrooms', icon:'🍄', title:'Mushrooms', color:'var(--teal)', names:["Lion's Mane","Chaga","Shiitake","Turkey Tail","Oyster Mushroom","Maitake","Reishi Mushroom","Cordyceps","Mushrooms"] }
  ]
};

function slugify(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function makeCard(item, i) {
  const card = document.createElement('a');
  card.className = 'card';
  card.href = `/benefits/${slugify(item.name)}`;
  card.style.animationDelay = (i * 0.02) + 's';
  card.innerHTML = `
    <span class="card-icon">${item.icon}</span>
    <div>
      <div class="card-title">${item.name}</div>
      <div class="card-cat tag tag-${item.cat}">${item.cat}</div>
    </div>
    <svg class="card-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>`;
  return card;
}

function render(items) {
  grid.innerHTML = '';
  if (!items.length) { noResults.style.display = 'block'; grid.style.display = 'none'; return; }
  noResults.style.display = 'none'; grid.style.display = 'grid';
  document.getElementById('count').textContent = items.length + ' item' + (items.length !== 1 ? 's' : '');

  // Check if we're in a cat that has subsections
  const subs = SUBSECTIONS[activeCat];
  if (subs && subs.length) {
    // Gather subsection items
    const subbed = new Set();
    subs.forEach(sub => {
      const subItems = items.filter(item => sub.names.includes(item.name));
      if (!subItems.length) return;
      subItems.forEach(i => subbed.add(i.name));

      // Build subsection wrapper
      const wrapper = document.createElement('div');
      wrapper.className = 'subsection';
      wrapper.style.gridColumn = '1 / -1';

      const header = document.createElement('div');
      header.className = 'subsection-header';
      header.innerHTML = `
        <span class="subsection-icon">${sub.icon}</span>
        <span class="subsection-title">${sub.title}</span>
        <span class="subsection-count">${subItems.length} items</span>
        <svg class="subsection-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>`;
      header.onclick = () => {
        header.classList.toggle('open');
        body.classList.toggle('open');
      };

      const colorBar = document.createElement('div');
      colorBar.className = 'subsection-color-bar';
      colorBar.style.background = sub.color;

      const body = document.createElement('div');
      body.className = 'subsection-body';
      const innerGrid = document.createElement('div');
      innerGrid.className = 'grid';
      subItems.forEach((item, i) => innerGrid.appendChild(makeCard(item, i)));
      body.appendChild(innerGrid);

      wrapper.appendChild(colorBar);
      wrapper.appendChild(header);
      wrapper.appendChild(body);
      grid.appendChild(wrapper);
    });

    // Remaining items not in subsections
    const rest = items.filter(item => !subbed.has(item.name));
    rest.forEach((item, i) => grid.appendChild(makeCard(item, i)));
  } else {
    items.forEach((item, i) => grid.appendChild(makeCard(item, i)));
  }
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = DATA.filter(d => {
    const matchCat = activeCat === 'all' || d.cat === activeCat;
    const inText = (arr) => Array.isArray(arr) && arr.some(s => String(s).toLowerCase().includes(q));
    const matchQ = !q
      || d.name.toLowerCase().includes(q)
      || (d.summary && d.summary.toLowerCase().includes(q))
      || inText(d.benefits)
      || inText(d.mechanisms)
      || inText(d.bestForms)
      || inText(d.pairings)
      || inText(d.cautions)
      || (d.dosage && d.dosage.toLowerCase().includes(q));
    return matchCat && matchQ;
  });
  render(filtered);
}

function setCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  filterCards();
}

function sectionList(title, labelIcon, items, listClass) {
  if (!items || !items.length) return '';
  return `
    <div class="detail-section-label"><span class="label-icon">${labelIcon}</span>${title}</div>
    <ul class="detail-list ${listClass}">
      ${items.map(b => `<li>${b}</li>`).join('')}
    </ul>`;
}

function renderDetail(item) {
  document.title = `${item.name} | Food Benefits | NutriMind`;
  document.querySelector('.controls').style.display = 'none';
  const countRow = document.querySelector('.controls + div');
  if (countRow) countRow.style.display = 'none';
  grid.style.display = 'none';
  noResults.style.display = 'none';

  const related = DATA
    .filter(d => d.name !== item.name && d.tags.some(t => item.tags.includes(t)) && d.cat === item.cat)
    .slice(0, 6);

  const detail = document.createElement('div');
  detail.className = 'detail';
  detail.innerHTML = `
    <a class="detail-back" href="/benefits">← All benefits</a>
    <article class="detail-card">
      <div class="detail-head">
        <span class="detail-icon">${item.icon}</span>
        <h1 class="detail-name">${item.name}</h1>
      </div>
      <div class="detail-meta">
        <span class="tag tag-${item.cat}">${item.cat}</span>
        ${item.tags.map(t => `<span class="tag tag-${t}">${t}</span>`).join('')}
      </div>
      ${item.summary ? `<p class="detail-summary">${item.summary}</p>` : ''}
      <div class="detail-section-label"><span class="label-icon">★</span>Benefits</div>
      <ul class="detail-benefits">
        ${item.benefits.map(b => `<li>${b}</li>`).join('')}
      </ul>
      ${sectionList('How it works', '⚛', item.mechanisms, 'mechanisms')}
      ${sectionList('Best forms & preparation', '◆', item.bestForms, 'forms')}
      ${sectionList('Synergistic pairings', '+', item.pairings, 'pairings')}
      ${sectionList('Cautions & interactions', '!', item.cautions, 'cautions')}
      ${item.dosage ? `
        <div class="detail-section-label"><span class="label-icon">℞</span>Typical dosage</div>
        <div class="detail-dosage">${item.dosage}</div>` : ''}
      ${related.length ? `
        <div class="detail-section-label"><span class="label-icon">↗</span>Related</div>
        <div class="related-grid">
          ${related.map(r => `
            <a class="related-item" href="/benefits/${slugify(r.name)}">
              <span class="related-item-icon">${r.icon}</span>
              <span>${r.name}</span>
            </a>`).join('')}
        </div>` : ''}
      <p class="detail-disclaimer">Educational reference only. Doses, interactions, and clinical claims are summaries of traditional use and published research — not medical advice. Consult a qualified clinician before making changes if you take medications, are pregnant or nursing, or have a chronic condition.</p>
    </article>
  `;
  grid.parentNode.insertBefore(detail, grid);
}

const pathMatch = window.location.pathname.match(/^\/benefits\/(.+?)\/?$/);
if (pathMatch) {
  const slug = decodeURIComponent(pathMatch[1]).toLowerCase();
  const item = DATA.find(d => slugify(d.name) === slug);
  if (item) {
    renderDetail(item);
  } else {
    document.querySelector('.controls').style.display = 'none';
    const countRow = document.querySelector('.controls + div');
    if (countRow) countRow.style.display = 'none';
    grid.style.display = 'none';
    noResults.style.display = 'block';
    noResults.textContent = `No food found for "${slug}"`;
  }
} else {
  render(DATA);
  document.getElementById('count').textContent = DATA.length + ' items';
}
</script>
