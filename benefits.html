<style>

    --bg: #0f0d0a;
    --surface: #1a1714;
    --card: #201d19;

    --green: #8fbe6b;
    --blue: #5b9bd5;
    --pink: #c86b8f;
    --purple: #9b7de8;
    --teal: #5bbfb5;
    --text: #f0ebe3;
    --muted: #7a7063;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 40px 20px 80px;
    background-image:
      radial-gradient(ellipse at 15% 10%, rgba(200,146,42,0.06) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 90%, rgba(91,155,213,0.05) 0%, transparent 50%);

  .nav-bar { max-width: 900px; margin: 0 auto 32px; display: flex; gap: 10px; flex-wrap: wrap; }
  .nav-link { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); text-decoration: none; border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; transition: all 0.2s; }
  .nav-link:hover, .nav-link.active { border-color: var(--accent); color: var(--accent); }
  header { text-align: center; margin-bottom: 36px; }
  .sub-label { font-size: 11px; font-weight: 500; letter-spacing: 0.35em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
  h1 { font-family: 'Playfair Display', serif; font-size: clamp(28px, 5vw, 52px); font-weight: 900; letter-spacing: -0.02em; line-height: 1; }
  h1 em { color: var(--accent); font-style: italic; }
  .header-line { width: 50px; height: 2px; background: var(--accent); margin: 16px auto 0; opacity: 0.5; }

  /* Search + Filter */
  .controls { max-width: 900px; margin: 0 auto 28px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .search-wrap { flex: 1; min-width: 200px; position: relative; }
  .search-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 14px 10px 36px; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; transition: border 0.2s; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }
  .cat-filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .cat-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; padding: 6px 12px; border-radius: 20px; cursor: pointer; transition: all 0.2s; }
  .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cat-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,146,42,0.08); }

  /* Count */
  .result-count { max-width: 900px; margin: 0 auto 16px; font-size: 12px; color: var(--muted); letter-spacing: 0.1em; }

  /* Grid */
  .grid { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    animation: fadeUp 0.3s ease both;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
  }
  .card:hover { border-color: #3e3a32; transform: translateY(-2px); }
  .card.expanded { border-color: var(--accent); }

  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

  .card-header { display: flex; align-items: flex-start; gap: 12px; }
  .card-icon { font-size: 22px; flex-shrink: 0; }
  .card-title { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.2; }
  .card-cat { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; margin-top: 3px; }
  .card-expand { margin-left: auto; color: var(--muted); font-size: 12px; flex-shrink: 0; transition: transform 0.2s; }
  .card.expanded .card-expand { transform: rotate(180deg); }

  .card-body { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .card.expanded .card-body { display: block; }

  .benefit-list { list-style: none; display: flex; flex-direction: column; gap: 7px; }
  .benefit-list li { display: flex; gap: 8px; align-items: flex-start; font-size: 13px; color: #c8b89a; line-height: 1.45; }
  .benefit-list li::before { content: '—'; color: var(--accent); flex-shrink: 0; margin-top: 1px; }

  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .tag { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; border: 1px solid; }

  .tag-herb { border-color: rgba(143,190,107,0.3); color: var(--green); background: rgba(143,190,107,0.07); }
  .tag-food { border-color: rgba(200,146,42,0.3); color: var(--accent); background: rgba(200,146,42,0.07); }
  .tag-drink { border-color: rgba(91,155,213,0.3); color: var(--blue); background: rgba(91,155,213,0.07); }
  .tag-supp { border-color: rgba(155,125,232,0.3); color: var(--purple); background: rgba(155,125,232,0.07); }
  .tag-spice { border-color: rgba(200,107,143,0.3); color: var(--pink); background: rgba(200,107,143,0.07); }
  .tag-fungi { border-color: rgba(91,191,181,0.3); color: var(--teal); background: rgba(91,191,181,0.07); }

  

  /* List view */
  .grid.list-view { grid-template-columns: 1fr !important; }
  .grid.list-view .card { display: flex; flex-direction: row; align-items: flex-start; gap: 0; padding: 0; }
  .grid.list-view .card-header { flex: 0 0 240px; padding: 14px 16px; border-bottom: none; border-right: 1px solid var(--border); }
  .grid.list-view .card.expanded .card-header { border-right-color: var(--accent); }
  .grid.list-view .card-body { flex: 1; padding: 14px 16px; margin-top: 0; border-top: none; border-left: none; display: none; }
  .grid.list-view .card.expanded .card-body { display: block; }
  .grid.list-view .card-expand { display: none; }
  .grid.list-view .card-header { cursor: pointer; }

  /* Subsections */
  .subsection { max-width: 900px; margin: 0 auto 8px; }
  .subsection-header {
    display: flex; align-items: center; gap: 12px;

    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 0;
    user-select: none;
  }
  .subsection-header:hover { border-color: #3e3a32; background: #1d1a16; }
  .subsection-header.open { border-color: var(--accent); border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
  .subsection-icon { font-size: 18px; }
  .subsection-title { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 700; color: var(--text); flex: 1; }
  .subsection-count { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }
  .subsection-chevron { color: var(--muted); transition: transform 0.25s; }
  .subsection-header.open .subsection-chevron { transform: rotate(180deg); }
  .subsection-color-bar { height: 3px; background: var(--teal); border-radius: 0; margin: 0; }
  .subsection-body {
    display: none;
    border: 1px solid var(--accent);
    border-top: none;
    border-bottom-left-radius: 8px;
    border-bottom-right-radius: 8px;
    padding: 12px;

  }

  .subsection-body .grid { max-width: 100%; margin: 0; }

  .no-results { max-width: 900px; margin: 40px auto; text-align: center; color: var(--muted); font-family: 'Playfair Display', serif; font-size: 18px; }
</style>
</head>

<script>
function toggleNav() {
  document.getElementById('navLinks').classList.toggle('open');
}
document.addEventListener('click', function(e) {
  const nav = document.getElementById('navLinks');
  const toggle = document.querySelector('.nav-toggle');
  if (nav && toggle && !nav.contains(e.target) && !toggle.contains(e.target)) {
    nav.classList.remove('open');
  }
});
</script>

let activeCat = 'all';
const grid = document.getElementById('grid');
const noResults = document.getElementById('noResults');

const SUBSECTIONS = {
  fungi: [
    { id:'mushrooms', icon:'🍄', title:'Mushrooms', color:'var(--teal)', names:["Lion's Mane","Chaga","Shiitake","Turkey Tail","Oyster Mushroom","Maitake","Reishi Mushroom","Cordyceps","Mushrooms"] }
  ]
};

function makeCard(item, i) {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.animationDelay = (i * 0.02) + 's';
  card.innerHTML = `
    <div class="card-header" onclick="toggleCard(this.closest('.card'))">
      <span class="card-icon">${item.icon}</span>
      <div>
        <div class="card-title">${item.name}</div>
        <div class="card-cat tag tag-${item.cat}">${item.cat}</div>
      </div>
      <svg class="card-expand" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
    </div>
    <div class="card-body">
      <ul class="benefit-list">
        ${item.benefits.map(b => `<li>${b}</li>`).join('')}
      </ul>
      <div class="tags">
        ${item.tags.map(t => `<span class="tag tag-${t}">${t}</span>`).join('')}
      </div>
    </div>`;
  return card;
}

function render(items) {
  grid.innerHTML = '';
  if (!items.length) { noResults.style.display = 'block'; grid.style.display = 'none'; return; }
  noResults.style.display = 'none'; grid.style.display = 'grid';
  document.getElementById('count').textContent = items.length + ' item' + (items.length !== 1 ? 's' : '');

  // Check if we're in a cat that has subsections
  const subs = SUBSECTIONS[activeCat];
  if (subs && subs.length) {
    // Gather subsection items
    const subbed = new Set();
    subs.forEach(sub => {
      const subItems = items.filter(item => sub.names.includes(item.name));
      if (!subItems.length) return;
      subItems.forEach(i => subbed.add(i.name));

      // Build subsection wrapper
      const wrapper = document.createElement('div');
      wrapper.className = 'subsection';
      wrapper.style.gridColumn = '1 / -1';

      const header = document.createElement('div');
      header.className = 'subsection-header';
      header.innerHTML = `
        <span class="subsection-icon">${sub.icon}</span>
        <span class="subsection-title">${sub.title}</span>
        <span class="subsection-count">${subItems.length} items</span>
        <svg class="subsection-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>`;
      header.onclick = () => {
        header.classList.toggle('open');
        body.classList.toggle('open');
      };

      const colorBar = document.createElement('div');
      colorBar.className = 'subsection-color-bar';
      colorBar.style.background = sub.color;

      const body = document.createElement('div');
      body.className = 'subsection-body';
      const innerGrid = document.createElement('div');
      innerGrid.className = 'grid';
      subItems.forEach((item, i) => innerGrid.appendChild(makeCard(item, i)));
      body.appendChild(innerGrid);

      wrapper.appendChild(colorBar);
      wrapper.appendChild(header);
      wrapper.appendChild(body);
      grid.appendChild(wrapper);
    });

    // Remaining items not in subsections
    const rest = items.filter(item => !subbed.has(item.name));
    rest.forEach((item, i) => grid.appendChild(makeCard(item, i)));
  } else {
    items.forEach((item, i) => grid.appendChild(makeCard(item, i)));
  }
}

function toggleCard(card) { card.classList.toggle('expanded'); }


let currentView = 'grid';
function setView(v) {
  currentView = v;
  document.getElementById('viewGrid').classList.toggle('active', v === 'grid');
  document.getElementById('viewList').classList.toggle('active', v === 'list');
  const g = document.getElementById('grid');
  if (v === 'list') {
    g.classList.add('list-view');
    // In list view, expand all cards
    document.querySelectorAll('.card').forEach(c => c.classList.add('expanded'));
  } else {
    g.classList.remove('list-view');
    document.querySelectorAll('.card').forEach(c => c.classList.remove('expanded'));
  }
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = DATA.filter(d => {
    const matchCat = activeCat === 'all' || d.cat === activeCat;
    const matchQ = !q || d.name.toLowerCase().includes(q) || d.benefits.some(b => b.toLowerCase().includes(q));
    return matchCat && matchQ;
  });
  render(filtered);
}

function setCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  filterCards();
}

render(DATA);
document.getElementById('count').textContent = DATA.length + ' items';
</script>
