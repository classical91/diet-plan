let activeCat = 'all';

function makeCard(d, i) {
  const total = d.macros.protein + d.macros.carb + d.macros.fat;
  const p = Math.round(d.macros.protein/total*100);
  const c = Math.round(d.macros.carb/total*100);
  const f = 100-p-c;

  const card = document.createElement('div');
  card.className = 'card';
  card.style.animationDelay = (i*0.02)+'s';

  card.innerHTML = `
    <div class="card-stripe" style="background:${d.color}"></div>
    <div class="card-header" onclick="this.closest('.card').classList.toggle('expanded')">
      <span class="card-icon">${d.icon}</span>
      <div class="card-meta">
        <div class="card-name">${d.name}</div>
        <div class="card-tagline">${d.tagline}</div>
      </div>
      <svg class="card-expand" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
    </div>
    <div class="macro-bar-row">
      <div class="macro-seg" style="width:${p}%;background:#5b9bd5;height:8px;border-radius:4px 0 0 4px"></div>
      <div class="macro-seg" style="width:${c}%;background:#c8922a;height:8px;border-radius:0"></div>
      <div class="macro-seg" style="width:${f}%;background:#8fbe6b;height:8px;border-radius:0 4px 4px 0"></div>
    </div>
    <div class="macro-label">
      <span class="ml"><span class="ml-dot" style="background:#5b9bd5;border-radius:2px"></span>Protein ${d.macros.protein}%</span>
      <span class="ml"><span class="ml-dot" style="background:#c8922a;border-radius:2px"></span>Carbs ${d.macros.carb}%</span>
      <span class="ml"><span class="ml-dot" style="background:#8fbe6b;border-radius:2px"></span>Fat ${d.macros.fat}%</span>
    </div>
    <div class="tags-row">
      ${d.tags.map(t=>`<span class="tag tag-${t.c}">${t.t}</span>`).join('')}
    </div>
    <div class="card-body">
      <div class="section-label">Overview</div>
      <div class="body-text">${d.summary}</div>
      <div class="two-col">
        <div>
          <div class="section-label" style="color:var(--green)">Eat</div>
          <ul class="food-list">${d.eat.map(e=>`<li class="eat">${e}</li>`).join('')}</ul>
        </div>
        <div>
          <div class="section-label" style="color:var(--red)">Avoid</div>
          <ul class="food-list">${d.avoid.map(a=>`<li class="avoid">${a}</li>`).join('')}</ul>
        </div>
      </div>
      <div class="section-label" style="color:var(--accent)">Benefits</div>
      <ul class="benefit-list">${d.benefits.map(b=>`<li>${b}</li>`).join('')}</ul>
      <div class="section-label">Best For</div>
      <div class="who-box" style="border-left-color:${d.whoColor}">${d.who}</div>
    </div>`;
  return card;
}

function render(items) {
  const grid = document.getElementById('grid');
  const noR = document.getElementById('noResults');
  grid.innerHTML = '';
  if (!items.length) { noR.style.display='block'; grid.style.display='none'; return; }
  noR.style.display='none'; grid.style.display='grid';
  document.getElementById('count').textContent = items.length + ' diet' + (items.length!==1?'s':'');
  items.forEach((d,i) => grid.appendChild(makeCard(d,i)));
}

function filter() {
  const q = document.getElementById('search').value.toLowerCase();
  const items = DIETS.filter(d => {
    const mc = activeCat === 'all' || d.cat === activeCat;
    const mq = !q || d.name.toLowerCase().includes(q) || d.tagline.toLowerCase().includes(q) || d.summary.toLowerCase().includes(q);
    return mc && mq;
  });
  render(items);
}

function setCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat===cat));
  filter();
}

render(DIETS);
</script>
