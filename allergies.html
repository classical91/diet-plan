<style>

  .severity-row{display:flex;align-items:center;gap:8px;padding:0 16px 10px}

  .note-box{background:var(--surface);border:1px solid var(--border);border-left:3px solid;border-radius:6px;padding:10px 12px;font-size:12px;color:#b0a898;line-height:1.55;margin-top:12px}
  .no-results{max-width:1100px;margin:40px auto;text-align:center;color:var(--muted);font-family:'Playfair Display',serif;font-size:18px}
</style>

<script>
function toggleNav() {
  document.getElementById('navLinks').classList.toggle('open');
}
document.addEventListener('click', function(e) {
  const nav = document.getElementById('navLinks');
  const toggle = document.querySelector('.nav-toggle');
  if (nav && toggle && !nav.contains(e.target) && !toggle.contains(e.target)) {
    nav.classList.remove('open');
  }
});
</script>

let activeCat = 'all';

function severityClass(s) {
  if (s==='high') return 'sev-high';
  if (s==='med') return 'sev-med';
  return 'sev-low';
}
function severityLabel(s) {
  if (s==='high') return 'High Risk';
  if (s==='med') return 'Moderate';
  return 'Manageable';
}

function makeCard(d, i) {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.animationDelay = (i*0.02)+'s';
  card.innerHTML = `
    <div class="card-stripe" style="background:${d.color}"></div>
    <div class="card-header" onclick="this.closest('.card').classList.toggle('expanded')">
      <span class="card-icon">${d.icon}</span>
      <div class="card-meta">
        <div class="card-name">${d.name}</div>
        <div class="card-tagline">${d.tagline}</div>
      </div>
      <svg class="card-expand" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
    </div>
    <div class="severity-row">
      <span class="sev-label">Risk level:</span>
      <span class="sev-chip ${severityClass(d.severity)}">${severityLabel(d.severity)}</span>
    </div>
    <div class="tags-row">${d.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    <div class="card-body">
      <div class="sec-lbl">Overview</div>
      <div class="body-text">${d.overview}</div>
      <div class="sec-lbl" style="color:var(--red)">Symptoms</div>
      <ul class="sym-list">${d.symptoms.map(s=>`<li class="${s.l==='severe'?'severe':s.l==='common'?'common':'mild'}">${s.s}</li>`).join('')}</ul>
      <div class="two-col" style="margin-top:14px">
        <div>
          <div class="sec-lbl" style="color:var(--red)">Avoid</div>
          <ul class="food-list">${d.avoid.map(a=>`<li class="avoid">${a}</li>`).join('')}</ul>
        </div>
        <div>
          <div class="sec-lbl" style="color:var(--green)">Safe Alternatives</div>
          <ul class="food-list">${d.safe.map(s=>`<li class="safe">${s}</li>`).join('')}</ul>
        </div>
      </div>
      <div class="sec-lbl" style="color:var(--accent)">Hidden Sources</div>
      <ul class="food-list">${d.hidden.map(h=>`<li class="hidden">${h}</li>`).join('')}</ul>
      <div class="note-box" style="border-left-color:${d.noteColor}">${d.note}</div>
    </div>`;
  return card;
}

function render(items) {
  const grid = document.getElementById('grid');
  const noR = document.getElementById('noResults');
  grid.innerHTML='';
  if (!items.length){noR.style.display='block';grid.style.display='none';return;}
  noR.style.display='none';grid.style.display='grid';
  document.getElementById('count').textContent=items.length+' item'+(items.length!==1?'s':'');
  items.forEach((d,i)=>grid.appendChild(makeCard(d,i)));
}

function filter() {
  const q=document.getElementById('search').value.toLowerCase();
  const items=DATA.filter(d=>{
    const mc=activeCat==='all'||d.cat===activeCat;
    const mq=!q||d.name.toLowerCase().includes(q)||d.tagline.toLowerCase().includes(q)||d.overview.toLowerCase().includes(q)||d.tags.some(t=>t.toLowerCase().includes(q));
    return mc&&mq;
  });
  render(items);
}

function setCat(cat) {
  activeCat=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));
  filter();
}

render(DATA);
</script>
