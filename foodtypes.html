  .food-card.expanded{border-color:var(--accent)}

  .food-icon{font-size:22px;flex-shrink:0}
  .food-meta{flex:1}
  .food-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px}

let activeCat = 'all';

// Build category selector
const catSel = document.getElementById('catSelector');
CATEGORIES.forEach(cat => {
  const count = cat.id === 'all' ? FOODS.length : FOODS.filter(f => f.cats.includes(cat.id)).length;
  const btn = document.createElement('div');
  btn.className = 'cat-card' + (cat.id === 'all' ? ' active' : '');
  btn.dataset.cat = cat.id;
  btn.innerHTML = `<div class="cat-icon">${cat.icon}</div><div class="cat-name">${cat.name}</div><div class="cat-count">${count} foods</div>`;
  btn.onclick = () => setCat(cat.id);
  catSel.appendChild(btn);
});

function makeCard(food, i) {
  const card = document.createElement('div');
  card.className = 'food-card';
  card.style.animationDelay = (i * 0.015) + 's';
  card.innerHTML = `
    <div class="food-stripe" style="background:${food.color}"></div>
    <div class="food-header" onclick="this.closest('.food-card').classList.toggle('expanded')">
      <span class="food-icon">${food.icon}</span>
      <div class="food-meta">
        <div class="food-name">${food.name}</div>
        <div class="food-sub">${food.sub}</div>
      </div>
      <svg class="food-expand" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
    </div>
    <div class="food-body">
      <div class="f-label" style="color:${food.color}">Benefits</div>
      <ul class="f-list">${food.benefits.map(b=>`<li>${b}</li>`).join('')}</ul>
      <div class="f-note">${food.note}</div>
      <div class="f-tags">${food.tags.map(t=>`<span class="f-tag">${t}</span>`).join('')}</div>
    </div>`;
  return card;
}

function render(items) {
  const grid = document.getElementById('grid');
  const noR = document.getElementById('noResults');
  grid.innerHTML = '';
  if (!items.length) { noR.style.display='block'; grid.style.display='none'; return; }
  noR.style.display='none'; grid.style.display='grid';
  document.getElementById('count').textContent = items.length + ' food' + (items.length!==1?'s':'');
  items.forEach((f,i) => grid.appendChild(makeCard(f,i)));
}

function filterFoods() {
  const q = document.getElementById('search').value.toLowerCase();
  const items = FOODS.filter(f => {
    const mc = activeCat === 'all' || f.cats.includes(activeCat);
    const mq = !q || f.name.toLowerCase().includes(q) || f.sub.toLowerCase().includes(q) || f.benefits.some(b=>b.toLowerCase().includes(q));
    return mc && mq;
  });
  render(items);
}

function setCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-card').forEach(b => b.classList.toggle('active', b.dataset.cat===cat));
  filterFoods();
}

render(FOODS);
</script>
