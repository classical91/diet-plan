  .symptom-list li.common::before { content: '—'; color: var(--accent); flex-shrink: 0; margin-top: 1px; }

<script>
function toggleNav() {
  document.getElementById('navLinks').classList.toggle('open');
}
document.addEventListener('click', function(e) {
  const nav = document.getElementById('navLinks');
  const toggle = document.querySelector('.nav-toggle');
  if (nav && toggle && !nav.contains(e.target) && !toggle.contains(e.target)) {
    nav.classList.remove('open');
  }
});
</script>

let activeCat = 'all';
const grid = document.getElementById('grid');
const noResults = document.getElementById('noResults');

function getRiskColor(level) {
  if (level === 'high') return 'var(--red)';
  if (level === 'med') return 'var(--accent)';
  return 'var(--green)';
}

function makeCard(item, i) {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.animationDelay = (i * 0.02) + 's';
  card.dataset.name = item.name.toLowerCase();
  card.dataset.symptoms = item.symptoms.map(s => s.s.toLowerCase()).join(' ');

  const prevalenceClass = item.prevalence;

  card.innerHTML = `
    <div class="card-top" style="background:${item.color}"></div>
    <div class="card-header" onclick="this.closest('.card').classList.toggle('expanded')">
      <span class="card-icon">${item.icon}</span>
      <div class="card-meta">
        <div class="card-title">${item.name}</div>
        <div class="card-sub"><span class="tag tag-${item.cat}">${item.cat}</span></div>
        <div class="prevalence-chip ${prevalenceClass}">${item.prevalenceLabel}</div>
      </div>
      <svg class="card-expand" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
    </div>
    <div class="card-body">
      <div class="risk-bar-wrap">
        <div class="risk-label">Severity</div>
        <div class="risk-bar-outer"><div class="risk-bar-inner risk-${item.riskLevel}" style="width:${item.riskLevel==='high'?'90%':item.riskLevel==='med'?'55%':'30%'}"></div></div>
      </div>
      <div class="divider"></div>
      <div class="section-label" style="color:${item.color}">Symptoms</div>
      <ul class="symptom-list">
        ${item.symptoms.map(s => `<li class="${s.level}">${s.s}</li>`).join('')}
      </ul>
      ${item.note ? `<div class="divider"></div><div style="font-size:12px;color:var(--muted);line-height:1.5;font-style:italic">${item.note}</div>` : ''}
      <div class="divider"></div>
      <div class="section-label" style="color:var(--green)">Food Sources</div>
      <div class="food-sources">
        ${item.foods.map(f => `<span class="food-pill">${f}</span>`).join('')}
      </div>
    </div>`;
  return card;
}

function render(items) {
  grid.innerHTML = '';
  if (!items.length) { noResults.style.display = 'block'; grid.style.display = 'none'; return; }
  noResults.style.display = 'none'; grid.style.display = 'grid';
  document.getElementById('count').textContent = items.length + ' deficiencie' + (items.length === 1 ? 'y' : 's');
  items.forEach((item, i) => grid.appendChild(makeCard(item, i)));
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = DATA.filter(d => {
    const matchCat = activeCat === 'all' || d.cat === activeCat;
    const matchQ = !q || d.name.toLowerCase().includes(q) || d.symptoms.some(s => s.s.toLowerCase().includes(q)) || d.foods.some(f => f.toLowerCase().includes(q));
    return matchCat && matchQ;
  });
  render(filtered);
}

function setCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  filterCards();
}

render(DATA);
</script>
